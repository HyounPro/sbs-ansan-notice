<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBS컴퓨터아트학원 안산점 개강안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --card: #1e1e1e;
    --border: #2c2c2c;
    --accent: #f5c400;
    --text: #efefef;
    --muted: #777;
    --green: #3dba74;
    --tag-bg: #252525;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; }

  header {
    background: #111;
    border-bottom: 2px solid var(--accent);
    padding: 1.2rem 2rem;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1440px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .logo h1 { font-size: 1.1rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; }
  .logo p { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }

  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; }
  .search-wrap input {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 0.45rem 0.9rem 0.45rem 2rem; border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; outline: none; width: 180px;
    transition: border-color 0.2s;
  }
  .search-wrap::before {
    content: '🔍'; position: absolute; left: 0.55rem; top: 50%; transform: translateY(-50%);
    font-size: 0.75rem; pointer-events: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }

  .filters { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .fbtn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 0.4rem 0.75rem; border-radius: 5px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; font-weight: 700;
    transition: all 0.15s; white-space: nowrap;
  }
  .fbtn.active, .fbtn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  main { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.8rem;
  }
  .count-text { font-size: 0.82rem; color: var(--muted); }
  .count-text strong { color: var(--accent); font-size: 1rem; }

  .copy-all {
    background: var(--accent); color: #000; border: none;
    padding: 0.55rem 1.2rem; border-radius: 7px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 700;
    transition: all 0.2s;
  }
  .copy-all:hover { background: #e6b800; }
  .copy-all.copied { background: var(--green); color: #fff; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.4); border-color: #383838; }

  .card-top {
    padding: 0.9rem 1.1rem 0.7rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 0.6rem;
  }
  .card-subject { font-weight: 700; font-size: 0.97rem; line-height: 1.35; }
  .card-days {
    font-size: 0.7rem; color: var(--muted); background: var(--tag-bg);
    border-radius: 4px; padding: 0.15rem 0.45rem; margin-top: 0.3rem; display: inline-block;
  }
  .room-tag {
    background: var(--accent); color: #000; font-size: 0.68rem; font-weight: 900;
    padding: 0.2rem 0.5rem; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 0.1rem;
  }

  .card-body { padding: 0.85rem 1.1rem; flex: 1; }
  .info { display: flex; font-size: 0.8rem; margin-bottom: 0.3rem; gap: 0.5rem; }
  .info-k { color: var(--muted); flex-shrink: 0; width: 64px; }
  .info-v { color: var(--text); word-break: break-all; }
  .info-v a { color: #5b9cf6; text-decoration: none; font-size: 0.75rem; }
  .info-v a:hover { text-decoration: underline; }

  .notice {
    font-size: 0.72rem; color: #f5a623; margin-top: 0.6rem; padding-top: 0.6rem;
    border-top: 1px solid var(--border); line-height: 1.45;
  }

  .copy-btn {
    width: 100%; margin-top: 0.7rem;
    background: #242424; border: 1px solid var(--border); color: var(--text);
    padding: 0.55rem; border-radius: 7px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; font-weight: 600;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 0.35rem;
  }
  .copy-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }

  .no-result { text-align: center; color: var(--muted); padding: 4rem; font-size: 0.9rem; grid-column: 1/-1; }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    header { padding: 1rem; }
    .grid { grid-template-columns: 1fr; }
    .search-wrap input { width: 140px; }
  }
</style>
</head>
<body>

    <div class="controls">

      </div>
      <div class="filters">
        <button class="fbtn active" onclick="setFilter('all',this)">전체</button>
        <button class="fbtn" onclick="setFilter('A',this)">A강의장</button>

</header>

<main>

];

function fmt(dateStr) {
  const [,m,d] = dateStr.split('-');
  return `${m}.${d}`;
}

function makeMsg(c) {
  return `■ SBS컴퓨터아트학원 안산점 개강안내\n· 수강과목 : ${c.subject}(${c.days})\n· 개강일 : ${fmt(c.start)}\n· 종강일 : ${fmt(c.end)}\n· 수강시간 : ${c.time}\n· 강의실 : 3층 ${c.room}강의장\n· 비대면링크 : ${discord[c.room]}\n· 대면/비대면 : 대면\n★ 격일 수업 일정은 카카오톡 공지사항에 노션 링크 확인해주세요!\n확인 후에 대면/비대면/참석 여부 확인 답장 부탁드립니다😊`;
}

let currentFilter = 'all';

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return courses.filter(c => {
    const rMatch = currentFilter === 'all' || c.room === currentFilter;
    const sMatch = !q || c.subject.toLowerCase().includes(q);
    return rMatch && sMatch;
  });
}

function setFilter(room, btn) {
  currentFilter = room;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 복사하기'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll(btn) {
  const filtered = getFiltered();
  const all = filtered.map(c => makeMsg(c)).join('\n\n' + '─'.repeat(28) + '\n\n');
  navigator.clipboard.writeText(all).then(() => {
    btn.textContent = '✓ 전체 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 현재 목록 전체 복사'; btn.classList.remove('copied'); }, 2500);
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('visibleCount').textContent = filtered.length;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-result">검색 결과가 없습니다</div>';
    return;
  }

  filtered.forEach(c => {
    const msg = makeMsg(c);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-subject">${c.subject}</div>
          <div class="card-days">${c.days} | ${c.time}</div>
        </div>
        <div class="room-tag">${c.room}강의장</div>
      </div>
      <div class="card-body">
        <div class="info"><span class="info-k">· 개강일</span><span class="info-v">${fmt(c.start)}</span></div>
        <div class="info"><span class="info-k">· 종강일</span><span class="info-v">${fmt(c.end)}</span></div>
        <div class="info"><span class="info-k">· 수강시간</span><span class="info-v">${c.time}</span></div>
        <div class="info"><span class="info-k">· 강의실</span><span class="info-v">3층 ${c.room}강의장</span></div>
        <div class="info"><span class="info-k">· 비대면링크</span><span class="info-v"><a href="${discord[c.room]}" target="_blank">${discord[c.room]}</a></span></div>
        <div class="info"><span class="info-k">· 대면여부</span><span class="info-v">대면</span></div>
        <div class="notice">★ 격일 수업 일정은 카카오톡 공지사항에 노션 링크 확인해주세요!</div>
        <button class="copy-btn" onclick="copyText(this.dataset.msg, this)" data-msg="${msg.replace(/"/g, '&quot;')}">📋 복사하기</button>
      </div>
    `;
    grid.appendChild(div);
  });
}

render();
</script>
</body>
