<style>

    --accent: #f5c400;
    --text: #efefef;
    --muted: #777;
    --green: #3dba74;

  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; }

    padding: 1.2rem 2rem;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1440px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .logo h1 { font-size: 1.1rem; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; }
  .logo p { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }

  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; }
  .search-wrap input {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 0.45rem 0.9rem 0.45rem 2rem; border-radius: 6px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; outline: none; width: 180px;
    transition: border-color 0.2s;
  }
  .search-wrap::before {
    content: '🔍'; position: absolute; left: 0.55rem; top: 50%; transform: translateY(-50%);
    font-size: 0.75rem; pointer-events: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }

  .filters { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .fbtn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 0.4rem 0.75rem; border-radius: 5px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; font-weight: 700;
    transition: all 0.15s; white-space: nowrap;
  }
  .fbtn.active, .fbtn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  /* 평일/주말 탭 */
  .mode-tabs {
    max-width: 1440px; margin: 0 auto;
    display: flex; gap: 0; padding: 1.2rem 2rem 0;
  }
  .mode-tab {
    padding: 0.6rem 2rem; cursor: pointer; font-weight: 700; font-size: 0.88rem;
    border: 2px solid var(--border); background: var(--card); color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .mode-tab:first-child { border-radius: 8px 0 0 0; }
  .mode-tab:last-child  { border-radius: 0 8px 0 0; border-left: none; }
  .mode-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  main { max-width: 1440px; margin: 0 auto; padding: 1.2rem 2rem 1.5rem; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.8rem;
  }
  .count-text { font-size: 0.82rem; color: var(--muted); }
  .count-text strong { color: var(--accent); font-size: 1rem; }

  .copy-all {
    background: var(--accent); color: #000; border: none;
    padding: 0.55rem 1.2rem; border-radius: 7px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 700;
    transition: all 0.2s;
  }
  .copy-all:hover { background: #e6b800; }
  .copy-all.copied { background: var(--green); color: #fff; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.4); border-color: #383838; }

  .card-top {
    padding: 0.9rem 1.1rem 0.7rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 0.6rem;
  }
  .card-subject { font-weight: 700; font-size: 0.97rem; line-height: 1.35; }
  .card-days {
    font-size: 0.7rem; color: var(--muted); background: var(--tag-bg);
    border-radius: 4px; padding: 0.15rem 0.45rem; margin-top: 0.3rem; display: inline-block;
  }
  .room-tag {
    background: var(--accent); color: #000; font-size: 0.68rem; font-weight: 900;
    padding: 0.2rem 0.5rem; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 0.1rem;
  }

  .card-body { padding: 0.85rem 1.1rem; flex: 1; }
  .info { display: flex; font-size: 0.8rem; margin-bottom: 0.3rem; gap: 0.5rem; }
  .info-k { color: var(--muted); flex-shrink: 0; width: 64px; white-space: nowrap; }
  .info-v { color: var(--text); word-break: break-all; }
  .info-v a { color: #5b9cf6; text-decoration: none; font-size: 0.75rem; }
  .info-v a:hover { text-decoration: underline; }

  .copy-btn {
    width: 100%; margin-top: 0.8rem;
    background: #242424; border: 1px solid var(--border); color: var(--text);
    padding: 0.55rem; border-radius: 7px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; font-weight: 600;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 0.35rem;
  }
  .copy-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }

  .no-result { text-align: center; color: var(--muted); padding: 4rem; font-size: 0.9rem; grid-column: 1/-1; }

  /* 다중선택 */
  .multi-btn {
    background: #242424; border: 1px solid var(--border); color: var(--muted);
    padding: 0.55rem 1.1rem; border-radius: 7px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 700;
    transition: all 0.2s;
  }
  .multi-btn.active { background: #3a2e00; border-color: var(--accent); color: var(--accent); }
  .multi-copy-bar {
    display: none; align-items: center; justify-content: space-between;
    background: #1a1a00; border: 1px solid var(--accent); border-radius: 8px;
    padding: 0.6rem 1rem; margin-bottom: 0.8rem; gap: 0.8rem;
  }
  .multi-copy-bar.visible { display: flex; }
  .multi-copy-bar .sel-count { color: var(--accent); font-size: 0.82rem; font-weight: 700; }
  .multi-copy-bar .btn-row { display: flex; gap: 0.5rem; }
  .multi-copy-bar button {
    padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 0.78rem; font-weight: 700; border: none;
  }
  .btn-do-copy { background: var(--accent); color: #000; }
  .btn-do-copy.copied { background: var(--green); color: #fff; }
  .btn-clear { background: #333; color: var(--muted); }
  .card.selectable { cursor: pointer; user-select: none; }
  .card.selectable:hover { border-color: var(--accent); }
  .card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); background: #1e1a00; }
  .card.selected .card-top { background: #2a2400; }
  .check-icon { display: none; }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    header { padding: 1rem; }
    .mode-tabs { padding: 1rem 1rem 0; }
    .grid { grid-template-columns: 1fr; }
    .search-wrap input { width: 140px; }
  }
</style>
</head>

  </div>

  { subject: '유크리입문', days: '토일', room: 'E', time: '12:00~15:00', start: '2026-03-21', end: '2026-04-12' },
  { subject: '캐드1', days: '토일', room: 'E', time: '15:00~18:00', start: '2026-03-21', end: '2026-04-12' },
  // F강의장
  { subject: '전산회계1급', days: '토일', room: 'F', time: '12:00~15:00', start: '2026-01-31', end: '2026-03-29' },
  { subject: '전산회계1급', days: '토일', room: 'F', time: '12:00~15:00', start: '2026-04-04', end: '2026-05-24' },
  { subject: '전산세무2급', days: '토일', room: 'F', time: '15:00~18:00', start: '2026-01-31', end: '2026-03-29' },
];

const weekdayRooms = ['A','B','C','D','E','F','G','H'];
const weekendRooms = ['A','B','C','E','F'];

let currentMode = 'weekday';
let currentFilter = 'all';

function getCourses() {
  return currentMode === 'weekday' ? weekdayCourses : weekendCourses;
}
function getRooms() {
  return currentMode === 'weekday' ? weekdayRooms : weekendRooms;
}

function fmt(dateStr) {
  const [,m,d] = dateStr.split('-');
  return `${m}.${d}`;
}

const FOOTER = `\n다양한 학원 소식을 인스타 팔로우 후 확인해보세요 :D\n▶ 학원 인스타그램 : https://www.instagram.com/sbsacademy_ansan/\n▶ 격일시간표 : https://hyounpro.github.io/sbs-ansan-schedule/\n★ 개강안내 확인 후 답변 부탁 드립니다!`;

function makeMsg(c) {
  return `■ SBS아카데미안산 개강안내 ■\n\n· 수강과목 : ${c.subject}(${c.days})\n· 개강일 : ${fmt(c.start)}\n· 종강일 : ${fmt(c.end)}\n· 수강시간 : ${c.time}\n· 강의실 : 3층 ${c.room}강의장\n· 비대면링크 : ${discord[c.room]}\n· 대면/비대면 : 대면\n· 특이사항 : -`;
}

function setMode(mode, btn) {
  currentMode = mode;
  currentFilter = 'all';
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFilterBtns();
  render();
}

function setFilter(room, btn) {
  currentFilter = room;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function renderFilterBtns() {
  const wrap = document.getElementById('filterBtns');
  const rooms = getRooms();
  wrap.innerHTML = `
    <button class="fbtn ${currentFilter==='all'?'active':''}" onclick="setFilter('all',this)">전체</button>
    ${rooms.map(r => `<button class="fbtn ${currentFilter===r?'active':''}" onclick="setFilter('${r}',this)">${r}강의장</button>`).join('')}
  `;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return getCourses().filter(c => {
    const rMatch = currentFilter === 'all' || c.room === currentFilter;
    const sMatch = !q || c.subject.toLowerCase().includes(q);
    return rMatch && sMatch;
  });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text + FOOTER).then(() => {
    btn.textContent = '✓ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 복사하기'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyAll(btn) {
  const filtered = getFiltered();
  const body = filtered.map(c => makeMsg(c)).join('\n\n──────────────────\n\n');
  const all = body + FOOTER;
  navigator.clipboard.writeText(all).then(() => {
    btn.textContent = '✓ 전체 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 전체 복사'; btn.classList.remove('copied'); }, 2500);
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('visibleCount').textContent = filtered.length;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-result">검색 결과가 없습니다</div>';
    return;
  }

  filtered.forEach(c => {
    const msg = makeMsg(c);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-subject">${c.subject}</div>
          <div class="card-days">${c.days} | ${c.time}</div>
        </div>
        <div class="room-tag">${c.room}강의장</div>
      </div>
      <div class="card-body">
        <div class="info"><span class="info-k">· 개강일</span><span class="info-v">${fmt(c.start)}</span></div>
        <div class="info"><span class="info-k">· 종강일</span><span class="info-v">${fmt(c.end)}</span></div>
        <div class="info"><span class="info-k">· 수강시간</span><span class="info-v">${c.time}</span></div>
        <div class="info"><span class="info-k">· 강의실</span><span class="info-v">3층 ${c.room}강의장</span></div>
        <div class="info"><span class="info-k">· 비대면링크</span><span class="info-v"><a href="${discord[c.room]}" target="_blank">${discord[c.room]}</a></span></div>
        <div class="info"><span class="info-k">· 대면여부</span><span class="info-v">대면</span></div>
        <button class="copy-btn" onclick="copyText(this.dataset.msg, this)" data-msg="${msg.replace(/"/g, '&quot;')}">📋 복사하기</button>
      </div>
    `;
    div.dataset.msg = msg;
    if (multiMode) div.classList.add('selectable');
    if (multiMode && selectedMsgs.has(msg)) div.classList.add('selected');
    div.addEventListener('click', (e) => {
      if (!multiMode) return;
      if (e.target.closest('.copy-btn')) return;
      if (selectedMsgs.has(msg)) {
        selectedMsgs.delete(msg);
        div.classList.remove('selected');
      } else {
        selectedMsgs.add(msg);
        div.classList.add('selected');
      }
      updateSelCount();
    });
    grid.appendChild(div);
  });
}

// 다중선택
let multiMode = false;
const selectedMsgs = new Set();

renderFilterBtns();
render();

function toggleMulti() {
  multiMode = !multiMode;
  const btn = document.getElementById('multiBtn');
  btn.classList.toggle('active', multiMode);
  btn.textContent = multiMode ? '✕ 선택 종료' : '☑️ 다중선택';
  if (!multiMode) {
    selectedMsgs.clear();
    updateSelCount();
  }
  render();
}
function updateSelCount() {
  const sel = selectedMsgs.size;
  document.getElementById('selCount').textContent = sel;
  document.getElementById('multiBar').classList.toggle('visible', sel > 0);
}
function clearSelection() {
  selectedMsgs.clear();
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
  updateSelCount();
}
function copySelected(btn) {
  const msgs = [...selectedMsgs];
  if (!msgs.length) return;
  const body = msgs.join('\n\n──────────────────\n\n');
  navigator.clipboard.writeText(body + FOOTER).then(() => {
    btn.textContent = '✓ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 선택 복사'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
